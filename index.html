<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ゆるかけ｜子供とお出かけ準備・公園検索・お助け動画ガイド</title>
    <meta name="description" content="子供との外出をラクにする「ゆるかけ」。現在地近くの公園や遊び場検索、忘れ物チェックリスト、月齢別の泣き止み動画、緊急ダイヤルを1つにまとめたパパママ応援ツール。">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #f6ad55; color: #c05621; background-color: #fffaf0; }
        .tab-text { font-size: 10px; font-weight: 800; letter-spacing: -0.8px; white-space: nowrap; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: #fdfaf3; max-width: 600px; margin: 0 auto; }
        .action-button { transition: transform 0.1s; }
        .action-button:active { transform: scale(0.95); }
        .header-soft { background-color: #fbd38d; border-radius: 0 0 40px 40px; }
        .card-shadow { box-shadow: 0 4px 14px 0 rgba(237, 137, 54, 0.1); }
        .kokoroe-text { font-size: 15px; line-height: 1.8; font-weight: 600; color: #5a4a42; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .animate-bounce-subtle { animation: bounce-subtle 1s infinite; }
    </style>
</head>
<body class="p-0 pb-24 text-gray-800">

    <header class="text-center p-6 header-soft shadow-sm mb-4">
        <h1 class="text-3xl font-bold text-orange-800 tracking-tighter">☕️ ゆるかけ</h1>
        <p class="text-[10px] text-orange-700 mt-2 font-bold tracking-widest">子供とゆるっとお出かけ。頑張らない日のガイド帳</p>
    </header>

    <div class="px-2">
        <div class="bg-white mx-4 p-3 rounded-2xl border-2 border-orange-200 text-center mb-6 card-shadow">
            <p class="text-[10px] text-gray-400">📍 検索エリア</p>
            <h3 id="city-display" class="font-bold text-orange-600 text-lg">現在地周辺</h3>
        </div>

        <div class="flex justify-between mb-6 sticky top-2 bg-white shadow-md rounded-full p-1 z-30 border border-orange-200 overflow-x-auto no-scrollbar">
            <button onclick="showPage('heart')" id="tab-heart" class="py-3 px-1 active-tab tab-text flex-1 text-center min-w-[50px] rounded-full">✨心得</button>
            <button onclick="showPage('map')" id="tab-map" class="py-3 px-1 text-gray-500 tab-text flex-1 text-center min-w-[50px] rounded-full">📍地図</button>
            <button onclick="showPage('check')" id="tab-check" class="py-3 px-1 text-gray-500 tab-text flex-1 text-center min-w-[50px] rounded-full">👜準備</button>
            <button onclick="showPage('video')" id="tab-video" class="py-3 px-1 text-gray-500 tab-text flex-1 text-center min-w-[50px] rounded-full">🎬動画</button>
            <button onclick="showPage('emergency')" id="tab-emergency" class="py-3 px-1 text-gray-500 tab-text flex-1 text-center min-w-[50px] rounded-full">🏥緊急</button>
            <button onclick="showPage('form')" id="tab-form" class="py-3 px-1 text-gray-500 tab-text flex-1 text-center min-w-[50px] rounded-full">📮声</button>
        </div>

        <div id="page-heart" class="space-y-4 px-2">
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-orange-200"><p class="kokoroe-text">● <span class="text-orange-600 font-bold">目的地にたどり着けなくても大丈夫。</span></p></div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-orange-200"><p class="kokoroe-text">● <span class="text-orange-600 font-bold">親のHPを最優先に。</span>自分が疲れる前に休みましょう。</p></div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-orange-200"><p class="kokoroe-text">● <span class="text-orange-600 font-bold">「何もしない」をしに行こう。</span></p></div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-orange-200"><p class="kokoroe-text">● <span class="text-orange-600 font-bold">泣いても、それも思い出。</span></p></div>
            <div class="bg-white p-5 rounded-3xl card-shadow border-b-4 border-orange-200"><p class="kokoroe-text">● <span class="text-orange-600 font-bold">笑顔で帰れたら100点満点。</span></p></div>
        </div>

        <div id="page-map" class="hidden space-y-4 px-2">
            <div class="bg-white p-4 rounded-2xl card-shadow border-2 border-blue-100 text-center">
                <p class="text-[12px] font-bold text-gray-500 mb-2">🔎 地名を入れて「検索」してね</p>
                <div class="flex flex-col gap-2 mb-2">
                    <div class="flex gap-2">
                        <input type="text" id="mapSearchInput" placeholder="例：代々木公園、横浜駅など" class="flex-1 p-2 border border-gray-300 rounded-lg text-sm">
                        <button onclick="searchMap()" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md action-button">検索</button>
                    </div>
                    <button onclick="getCurrentLocation()" class="bg-gray-100 text-blue-600 p-2 rounded-lg font-bold text-xs border border-blue-200 action-button">📍 現在地から探す</button>
                </div>
                
                <div id="search-guide" class="hidden bg-orange-50 border border-orange-200 rounded-xl p-2 my-2 animate-bounce-subtle">
                    <p class="text-[11px] text-orange-700 font-bold">
                        ✨ 準備OK！<br>下のボタンを押して近くの施設を探そう！
                    </p>
                </div>

                <div id="mapContainer" style="display: none;"><iframe id="mapFrame" width="100%" height="300" style="border:0; border-radius: 10px;" allowfullscreen="" loading="lazy"></iframe></div>
            </div>
            <div class="grid grid-cols-1 gap-3 text-sm">
                <button onclick="quickSearch('支援センター 室内遊び場')" class="bg-white p-4 rounded-xl border-l-4 border-blue-400 shadow-sm text-left font-bold action-button">🧸 支援センター・室内遊び場</button>
                <button onclick="quickSearch('大きな公園 アスレチック')" class="bg-white p-4 rounded-xl border-l-4 border-green-400 shadow-sm text-left font-bold action-button">🌳 公園・大型遊具</button>
                <button onclick="quickSearch('水族館 動物園')" class="bg-white p-4 rounded-xl border-l-4 border-cyan-400 shadow-sm text-left font-bold action-button">🐬 水族館・動物園</button>
                <button onclick="quickSearch('観光スポット レジャー施設')" class="bg-white p-4 rounded-xl border-l-4 border-indigo-400 shadow-sm text-left font-bold action-button">🔭 観光・レジャー・道の駅</button>
                <button onclick="quickSearch('ショッピングモール')" class="bg-white p-4 rounded-xl border-l-4 border-pink-400 shadow-sm text-left font-bold action-button">🛍 ショッピングモール</button>
            </div>
        </div>

        <div id="page-check" class="hidden space-y-4 px-2">
            <div class="bg-white p-5 rounded-2xl card-shadow border-l-8 border-orange-400">
                <h3 class="font-bold mb-4 text-orange-800 text-sm italic">👜 忘れ物チェック</h3>
                <div class="space-y-3 text-[14px]">
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-6 h-6"> <span>おむつ・おしりふき</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-6 h-6"> <span>着替え・タオル・袋</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-6 h-6 font-bold text-blue-600"> <span>エプロン・紙パックケース</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-6 h-6"> <span>飲み物・おやつ・離乳食</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-6 h-6"> <span>除菌シート・ティッシュ</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" class="w-6 h-6"> <span>母子手帳・保険証</span></label>
                </div>
            </div>
        </div>

        <div id="page-video" class="hidden space-y-4 px-2 text-center">
            <div class="bg-white p-5 rounded-2xl card-shadow border-2 border-orange-100">
                <h3 class="font-bold mb-4 text-orange-800 text-sm underline">📺 月齢・目的別動画</h3>
                <div class="grid grid-cols-2 gap-2 mb-4 text-xs font-bold">
                    <a href="https://www.youtube.com/results?search_query=0%E6%AD%B3+%E8%B5%A4%E3%81%A1%E3%82%83%E3%82%93" target="_blank" class="bg-pink-50 p-4 rounded-xl">👶 0歳</a>
                    <a href="https://www.youtube.com/results?search_query=1%E6%AD%B3+%E5%AD%90%E4%BE%9B" target="_blank" class="bg-orange-50 p-4 rounded-xl">🐥 1歳</a>
                </div>
                <div class="grid grid-cols-1 gap-2 font-bold text-white">
                    <a href="https://www.youtube.com/results?search_query=%E6%89%8B%E9%81%8A%E3%81%B3%E6%AD%8C" target="_blank" class="bg-red-400 p-4 rounded-xl">🙌 手遊び</a>
                    <a href="https://www.youtube.com/results?search_query=%E5%AF%9D%E3%81%8B%E3%81%97%E3%81%A4%E3%81%91" target="_blank" class="bg-indigo-400 p-4 rounded-xl">🌙 寝かしつけ</a>
                </div>
            </div>
        </div>

        <div id="page-emergency" class="hidden space-y-4 px-2">
            <div class="bg-red-50 p-5 rounded-3xl border-2 border-red-200">
                <a href="tel:8000" class="bg-white p-4 rounded-2xl flex justify-between items-center mb-3 border-2 border-red-400">
                    <div><p class="text-[10px] text-red-500">夜間相談</p><p class="font-bold text-red-800 text-xl">#8000</p></div>
                    <span class="text-xs bg-red-50 px-2 py-1 rounded">子ども医療相談</span>
                </a>
                <button onclick="quickSearch('小児科')" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold">🌡 近くの小児科を探す</button>
            </div>
        </div>

        <div id="page-form" class="hidden p-8 text-center bg-orange-50 rounded-3xl">
            <h3 class="font-bold text-orange-800">📮 意見箱</h3>
            <a href="https://forms.gle/iprNpCrzkANENyJr5" target="_blank" class="mt-4 inline-block bg-orange-400 text-white px-8 py-3 rounded-full font-bold shadow-md">開く</a>
        </div>
    </div>

    <script>
        let currentTargetArea = "現在地周辺"; 

        function showPage(pageName) {
            const pages = ['heart', 'map', 'check', 'video', 'emergency', 'form'];
            pages.forEach(p => {
                document.getElementById('page-' + p).classList.add('hidden');
                document.getElementById('tab-' + p).classList.remove('active-tab');
                document.getElementById('tab-' + p).classList.add('text-gray-500');
            });
            document.getElementById('page-' + pageName).classList.remove('hidden');
            document.getElementById('tab-' + pageName).classList.add('active-tab');
            document.getElementById('tab-' + pageName).classList.remove('text-gray-500');
        }

        function searchMap() {
            const query = document.getElementById('mapSearchInput').value;
            if (query) {
                currentTargetArea = query;
                document.getElementById('city-display').innerText = query + " 付近";
                document.getElementById('mapFrame').src = `https://maps.google.co.jp/maps?q=${encodeURIComponent(query)}&output=embed`;
                document.getElementById('mapContainer').style.display = 'block';
                document.getElementById('search-guide').classList.remove('hidden'); // 案内を表示
            }
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    document.getElementById('mapFrame').src = `https://maps.google.co.jp/maps?q=${lat},${lng}&output=embed`;
                    document.getElementById('mapContainer').style.display = 'block';
                    document.getElementById('search-guide').classList.remove('hidden'); // 案内を表示
                    document.getElementById('city-display').innerText = "現在地周辺";
                }, () => { alert("許可されませんでした"); });
            }
        }

        function quickSearch(category) {
            const area = currentTargetArea || "現在地周辺";
            window.open(`https://www.google.co.jp/maps/search/${encodeURIComponent(area + " " + category)}`, '_blank');
        }
    </script>
</body>
</html>
